<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 pt-32 min-h-screen">
  <div class="mb-12">
    <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 dark:text-white mb-4">Useful Courses</h1>
    <p class="text-xl text-slate-600 dark:text-slate-400">Expand your knowledge with these curated courses in AI, DS, and development.</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    <div *ngFor="let course of courses" 
         class="p-6 rounded-3xl glass dark:glass-dark border border-slate-200 dark:border-slate-800 hover:border-purple-500/50 transition-all duration-300 hover:shadow-xl hover:shadow-purple-500/10 flex flex-col justify-between transform hover:-translate-y-1">
      <div>
        <div class="flex items-center justify-between mb-4">
          <span [ngClass]="{
                  'bg-green-100 text-green-800 dark:bg-green-950/30 dark:text-green-400': course.difficulty === 'Beginner',
                  'bg-blue-100 text-blue-800 dark:bg-blue-950/30 dark:text-blue-400': course.difficulty === 'Intermediate',
                  'bg-purple-100 text-purple-800 dark:bg-purple-950/30 dark:text-purple-400': course.difficulty === 'Advanced'
                }" 
                class="px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider">
            {{course.difficulty}}
          </span>
          <span class="text-slate-500 dark:text-slate-400 text-sm font-semibold flex items-center gap-1">
            ⏱️ {{course.duration}}
          </span>
        </div>
        <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-3">{{course.name}}</h2>
        <p class="text-slate-600 dark:text-slate-400 text-sm sm:text-base leading-relaxed mb-6">{{course.description}}</p>
      </div>

      <a [href]="course.enroll_url" 
         class="w-full text-center py-3 rounded-xl bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 font-bold hover:bg-slate-800 dark:hover:bg-slate-200 transition-colors">
        Enroll Now
      </a>
    </div>
  </div>
</div>
