<div class="relative overflow-hidden min-h-screen flex items-center justify-center pt-20 bg-slate-50 dark:bg-slate-950">
  <!-- Animated Background Blobs -->
  <div class="absolute inset-0 overflow-hidden -z-10">
    <div class="absolute top-[10%] left-[20%] w-96 h-96 bg-blue-500/20 dark:bg-blue-600/10 rounded-full filter blur-3xl animate-blob"></div>
    <div class="absolute bottom-[10%] right-[20%] w-96 h-96 bg-purple-500/20 dark:bg-purple-600/10 rounded-full filter blur-3xl animate-blob animation-delay-2000"></div>
  </div>

  <!-- Login Card -->
  <div class="w-full max-w-md p-8 sm:p-10 rounded-3xl glass dark:glass-dark border border-slate-200 dark:border-slate-800 shadow-2xl relative">
    <div class="text-center mb-8">
      <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-blue-600 to-purple-600 flex items-center justify-center shadow-lg shadow-blue-500/30 mx-auto mb-4">
        <span class="text-white font-bold text-2xl">AI</span>
      </div>
      <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white">Student Portal</h2>
      <p class="text-sm text-slate-500 dark:text-slate-400 mt-2">Sign in to access your Semester 5 notes and materials</p>
    </div>

    <!-- Error/Success Alerts -->
    <div *ngIf="errorMessage" class="mb-6 p-4 rounded-xl bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 text-sm font-medium border border-red-100 dark:border-red-900/30">
      {{errorMessage}}
    </div>
    <div *ngIf="successMessage" class="mb-6 p-4 rounded-xl bg-green-50 dark:bg-green-900/20 text-green-600 dark:text-green-400 text-sm font-medium border border-green-100 dark:border-green-900/30">
      {{successMessage}}
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label for="student_id" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Student ID</label>
        <input type="text" id="student_id" [(ngModel)]="student_id" name="student_id" required placeholder="e.g. AD2026101"
               class="w-full px-5 py-3 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all text-slate-900 dark:text-white" />
      </div>

      <div>
        <label for="password" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Password</label>
        <input type="password" id="password" [(ngModel)]="password" name="password" required placeholder="••••••••"
               class="w-full px-5 py-3 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all text-slate-900 dark:text-white" />
      </div>

      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center gap-2 cursor-pointer select-none text-slate-600 dark:text-slate-400">
          <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" 
                 class="rounded border-slate-300 dark:border-slate-700 text-purple-600 focus:ring-purple-500 bg-white dark:bg-slate-900 w-4 h-4" />
          Remember Me
        </label>
        <a href="#" class="text-purple-600 dark:text-purple-400 hover:underline font-medium">Forgot Password?</a>
      </div>

      <div class="flex flex-col gap-3 pt-2">
        <button type="submit" 
                class="w-full py-4 rounded-2xl bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold text-lg hover:shadow-lg hover:shadow-purple-500/40 transform hover:-translate-y-0.5 transition-all">
          Login
        </button>
        <button type="button" (click)="onRegister()"
                class="w-full py-4 rounded-2xl bg-slate-100 dark:bg-slate-900 hover:bg-slate-200 dark:hover:bg-slate-800 text-slate-900 dark:text-white font-semibold text-lg border border-slate-200 dark:border-slate-800 transition-all">
          Register New Account
        </button>
      </div>
    </form>
  </div>
</div>
