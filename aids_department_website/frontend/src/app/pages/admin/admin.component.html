<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 pt-32 min-h-screen" *ngIf="isAuthorized">
  <div class="mb-12 flex items-center justify-between">
    <div>
      <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 dark:text-white mb-4">Admin Dashboard</h1>
      <p class="text-xl text-slate-600 dark:text-slate-400">Manage department announcements, courses, and syllabus files.</p>
    </div>
    <button (click)="logout()" class="px-6 py-3 rounded-full bg-red-600 text-white font-bold shadow-md hover:bg-red-700 transition-colors">
      Logout
    </button>
  </div>

  <!-- Messages -->
  <div *ngIf="successMessage" class="mb-6 p-4 rounded-xl bg-green-50 dark:bg-green-900/20 text-green-600 dark:text-green-400 font-medium border border-green-100 dark:border-green-900/30">
    {{successMessage}}
  </div>
  <div *ngIf="errorMessage" class="mb-6 p-4 rounded-xl bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 font-medium border border-red-100 dark:border-red-900/30">
    {{errorMessage}}
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
    <!-- Publish Announcement Form -->
    <div class="glass dark:glass-dark p-8 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-xl">
      <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-6 flex items-center gap-2">
        <span>📢</span> Publish Announcement
      </h2>
      <form (ngSubmit)="addAnnouncement()" class="space-y-6">
        <div>
          <label for="annTitle" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Title</label>
          <input type="text" id="annTitle" [(ngModel)]="announcementTitle" name="annTitle" required placeholder="Announcement Title"
                 class="w-full px-5 py-3 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all text-slate-900 dark:text-white" />
        </div>
        <div>
          <label for="annContent" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Content</label>
          <textarea id="annContent" [(ngModel)]="announcementContent" name="annContent" required rows="4" placeholder="Announcement Details..."
                    class="w-full px-5 py-3 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all text-slate-900 dark:text-white"></textarea>
        </div>
        <button type="submit" class="w-full py-4 rounded-2xl bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold text-lg hover:shadow-lg transition-all">
          Publish Announcement
        </button>
      </form>
    </div>

    <!-- Create Course Form -->
    <div class="glass dark:glass-dark p-8 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-xl">
      <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-6 flex items-center gap-2">
        <span>🎓</span> Create Useful Course
      </h2>
      <form (ngSubmit)="addCourse()" class="space-y-4">
        <div>
          <label for="cName" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Course Name</label>
          <input type="text" id="cName" [(ngModel)]="courseName" name="cName" required placeholder="Course Name"
                 class="w-full px-5 py-3 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all text-slate-900 dark:text-white" />
        </div>
        <div>
          <label for="cDesc" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Description</label>
          <input type="text" id="cDesc" [(ngModel)]="courseDescription" name="cDesc" required placeholder="Brief description..."
                 class="w-full px-5 py-3 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all text-slate-900 dark:text-white" />
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label for="cDuration" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Duration</label>
            <input type="text" id="cDuration" [(ngModel)]="courseDuration" name="cDuration" required placeholder="e.g. 6 Weeks"
                   class="w-full px-5 py-3 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all text-slate-900 dark:text-white" />
          </div>
          <div>
            <label for="cDifficulty" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Difficulty</label>
            <select id="cDifficulty" [(ngModel)]="courseDifficulty" name="cDifficulty"
                    class="w-full px-5 py-3 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all text-slate-900 dark:text-white">
              <option value="Beginner">Beginner</option>
              <option value="Intermediate">Intermediate</option>
              <option value="Advanced">Advanced</option>
            </select>
          </div>
        </div>
        <button type="submit" class="w-full py-4 rounded-2xl bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold text-lg hover:shadow-lg transition-all mt-4">
          Create Course
        </button>
      </form>
    </div>
  </div>

  <!-- Subject Registration Form -->
  <div class="glass dark:glass-dark p-8 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-xl mt-12 max-w-2xl">
    <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-6 flex items-center gap-2">
      <span>📚</span> Add Subject (Syllabus)
    </h2>
    <form (ngSubmit)="addSubject()" class="space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label for="sName" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Subject Name</label>
          <input type="text" id="sName" [(ngModel)]="subjectName" name="sName" required placeholder="Subject Name"
                 class="w-full px-5 py-3 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all text-slate-900 dark:text-white" />
        </div>
        <div>
          <label for="sCode" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Subject Code</label>
          <input type="text" id="sCode" [(ngModel)]="subjectCode" name="sCode" required placeholder="e.g. AD501"
                 class="w-full px-5 py-3 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all text-slate-900 dark:text-white" />
        </div>
      </div>
      <div>
        <label for="sDesc" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Description</label>
        <textarea id="sDesc" [(ngModel)]="subjectDescription" name="sDesc" required rows="3" placeholder="Subject description..."
                  class="w-full px-5 py-3 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all text-slate-900 dark:text-white"></textarea>
      </div>
      <button type="submit" class="w-full py-4 rounded-2xl bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold text-lg hover:shadow-lg transition-all mt-4">
        Add Subject
      </button>
    </form>
  </div>
</div>
